name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
env:
  COLOR: true
  FORCE_COLOR: 1
  MYPY_FORCE_COLOR: 1
  PY_COLORS: 1
  UPSTREAM_REPOSITORY_ID: '13258039'
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
permissions: {}
jobs:
  pre-setup:
    name: Pre-Setup global build settings
    runs-on: self-hosted
    outputs:
      upstream-repository-id: ${{ env.UPSTREAM_REPOSITORY_ID }}
      release-requested: |-
        ${{
          (
            github.event_name == 'push'
            && github.ref_type == 'tag'
          )
          && true
          || false
        }}
    steps:
    - name: Dummy
      if: false
      run: |
        echo "Pre-setup step"
  lint:
    permissions:
      contents: read
    name: Linter
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Verify that `requirements/runtime-deps.in` is in sync with `pyproject.toml`
      run: |
        set -eEuo pipefail
        make sync-direct-runtime-deps
        git diff --exit-code -- requirements/runtime-deps.in
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.11
    - name: Cache PyPI
      uses: actions/cache@v5.0.5
      with:
        key: pip-lint-${{ hashFiles('requirements/*.txt') }}
        path: ~/.cache/pip
        restore-keys: |
          pip-lint-
    - name: Install dependencies
      run: |
        python -m pip install -U pip wheel setuptools build twine -r requirements/lint.in -c requirements/lint.txt
    - name: Install self
      run: |
        python -m pip install . -c requirements/runtime-deps.txt
      env:
        AIOHTTP_NO_EXTENSIONS: 1
    - name: Run mypy
      run: |
        make mypy
    - name: Run slotscheck
      run: |
        # Some extra requirements are needed to ensure all modules
        # can be scanned by slotscheck.
        pip install -r requirements/base.in -c requirements/base.txt
        slotscheck -v -m aiohttp
    - name: Install spell checker
      run: |
        pip install -r requirements/doc-spelling.in -c requirements/doc-spelling.txt
    - name: Run docs spelling
      run: |
        # towncrier --yes  # uncomment me after publishing a release
        make doc-spelling
    - name: Build package
      run: |
        python -m build
      env:
        AIOHTTP_NO_EXTENSIONS: 1
    - name: Run twine checker
      run: |
        twine check --strict dist/*
    - name: Making sure that CONTRIBUTORS.txt remains sorted
      run: |
        LC_ALL=C sort --check --ignore-case CONTRIBUTORS.txt
  gen_llhttp:
    permissions:
      contents: read
    name: Generate llhttp sources
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Cache llhttp generated files
      uses: actions/cache@v5.0.5
      id: cache
      with:
        key: llhttp-${{ hashFiles('vendor/llhttp/package*.json', 'vendor/llhttp/src/**/*')
          }}
        path: vendor/llhttp/build
    - name: Setup NodeJS
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/setup-node@v6
      with:
        node-version: 18
    - name: Generate llhttp sources
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        make generate-llhttp
    - name: Upload llhttp generated files
      uses: actions/upload-artifact@v7
      with:
        name: llhttp
        path: vendor/llhttp/build
        if-no-files-found: error
  test:
    permissions:
      contents: read
    name: Test
    needs: gen_llhttp
    strategy:
      matrix:
        pyver:
        - '3.10'
        no-extensions:
        - ''
        os:
        - ubuntu-latest
        experimental:
        - false
      fail-fast: false
    runs-on: self-hosted
    continue-on-error: ${{ matrix.experimental }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Python ${{ matrix.pyver }}
      id: python-install
      env:
        UV_PYTHON_PREFERENCE: only-managed
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.pyver }}
        activate-environment: true
        enable-cache: true
    - name: Install dependencies
      env:
        DEPENDENCY_GROUP: test${{ endsWith(matrix.pyver, 't') && '-ft' || '' }}
      run: |
        uv pip install -U pip wheel setuptools build twine -r requirements/${{ env.DEPENDENCY_GROUP }}.in -c requirements/${{ env.DEPENDENCY_GROUP }}.txt
    - name: Set PYTHON_GIL=0 for free-threading builds
      if: ${{ endsWith(matrix.pyver, 't') }}
      run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
    - name: Restore llhttp generated files
      if: ${{ matrix.no-extensions == '' }}
      uses: actions/download-artifact@v8
      with:
        name: llhttp
        path: vendor/llhttp/build/
    - name: Cythonize
      if: ${{ matrix.no-extensions == '' }}
      run: |
        make cythonize
    - name: Install self
      env:
        AIOHTTP_NO_EXTENSIONS: ${{ matrix.no-extensions }}
      run: uv pip install -e .
    - name: Run unittests
      env:
        COLOR: true
        AIOHTTP_NO_EXTENSIONS: ${{ matrix.no-extensions }}
        PIP_USER: 1
      run: pytest --junitxml=junit.xml --numprocesses=auto --cov=aiohttp/ --cov=tests/
        -m 'not dev_mode and not autobahn'
      shell: bash
    - name: Re-run the failing tests with maximum verbosity
      if: failure()
      env:
        COLOR: true
        AIOHTTP_NO_EXTENSIONS: ${{ matrix.no-extensions }}
      run: pytest --no-cov -vvvvv --lf && exit 1
      shell: bash
    - name: Run dev_mode tests
      env:
        COLOR: true
        AIOHTTP_NO_EXTENSIONS: ${{ matrix.no-extensions }}
        PIP_USER: 1
        PYTHONDEVMODE: 1
      run: pytest -m dev_mode --cov=aiohttp/ --cov=tests/ --cov-append
      shell: bash
    - name: Turn coverage into xml
      env:
        COLOR: 'yes'
        PIP_USER: 1
      run: |
        python -m coverage xml
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: |-
          CI-GHA,OS-${{
            runner.os
          }},VM-${{
            matrix.os
          }},Py-${{
            steps.python-install.outputs.python-version
          }}
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v6
      with:
        files: ./junit.xml
        report_type: test_results
        token: ${{ secrets.CODECOV_TOKEN }}
  autobahn:
    permissions:
      contents: read
    name: Autobahn testsuite
    needs: gen_llhttp
    strategy:
      matrix:
        pyver:
        - '3.14'
        no-extensions:
        - ''
        os:
        - ubuntu-latest
      fail-fast: false
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Python ${{ matrix.pyver }}
      id: python-install
      env:
        UV_PYTHON_PREFERENCE: only-managed
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.pyver }}
        activate-environment: true
        enable-cache: true
    - name: Install dependencies
      env:
        DEPENDENCY_GROUP: test${{ endsWith(matrix.pyver, 't') && '-ft' || '' }}
      run: |
        uv pip install -U pip wheel setuptools build twine -r requirements/${{ env.DEPENDENCY_GROUP }}.in -c requirements/${{ env.DEPENDENCY_GROUP }}.txt
    - name: Restore llhttp generated files
      if: ${{ matrix.no-extensions == '' }}
      uses: actions/download-artifact@v8
      with:
        name: llhttp
        path: vendor/llhttp/build/
    - name: Cythonize
      if: ${{ matrix.no-extensions == '' }}
      run: |
        make cythonize
    - name: Install self
      env:
        AIOHTTP_NO_EXTENSIONS: ${{ matrix.no-extensions }}
      run: uv pip install -e .
    - name: Run unittests
      env:
        COLOR: true
        AIOHTTP_NO_EXTENSIONS: ${{ matrix.no-extensions }}
        PIP_USER: 1
      run: PATH="${HOME}/Library/Python/3.11/bin:${HOME}/.local/bin:${PATH}" pytest
        --junitxml=junit.xml --cov=aiohttp/ --cov=tests/ --timeout=0 -m autobahn
      shell: bash
    - name: Turn coverage into xml
      env:
        COLOR: 'yes'
        PIP_USER: 1
      run: |
        python -m coverage xml
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        flags: Autobahn
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v6
      with:
        files: ./junit.xml
        report_type: test_results
        token: ${{ secrets.CODECOV_TOKEN }}
  benchmark:
    name: Benchmark
    needs:
    - gen_llhttp
    - pre-setup
    if: needs.pre-setup.outputs.upstream-repository-id == github.repository_id
    runs-on: self-hosted
    steps:
    - name: Checkout project
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Python 3.13.2
      id: python-install
      uses: actions/setup-python@v6
      with:
        python-version: 3.13.2
        cache: pip
        cache-dependency-path: requirements/*.txt
    - name: Install dependencies
      run: |
        python -m pip install -U pip wheel setuptools build twine -r requirements/test.in -c requirements/test.txt
    - name: Restore llhttp generated files
      uses: actions/download-artifact@v8
      with:
        name: llhttp
        path: vendor/llhttp/build/
    - name: Cythonize
      run: |
        make cythonize
    - name: Install self
      run: python -m pip install -e .
    - name: Run benchmarks
      uses: CodSpeedHQ/action@v4
      with:
        mode: instrumentation
        run: python -Im pytest --no-cov -vvvvv --codspeed --durations=30 --timeout=0
  cython-coverage:
    permissions:
      contents: read
    name: Cython coverage
    needs: gen_llhttp
    strategy:
      matrix:
        os:
        - ubuntu-latest
      fail-fast: false
    runs-on: self-hosted
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Python
      id: python-install
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -Im pip install -U pip wheel setuptools build twine -r requirements/test.in -c requirements/test.txt
    - name: Uninstall blocbuster
      run: python -m pip uninstall blockbuster -y
    - name: Restore llhttp generated files
      uses: actions/download-artifact@v8
      with:
        name: llhttp
        path: vendor/llhttp/build/
    - name: Cythonize with linetrace
      run: |
        make cythonize CYTHON_EXTRA="-X linetrace=True"
    - name: Install self
      env:
        AIOHTTP_CYTHON_TRACE: 1
      run: python -m pip install -e .
    - name: Run tests with Cython tracing
      env:
        COLOR: true
        PIP_USER: 1
      run: pytest tests/test_client_functional.py tests/test_http_parser.py tests/test_http_writer.py
        tests/test_web_functional.py tests/test_web_response.py tests/test_websocket_parser.py
        --cov-config=.coveragerc-cython.toml --cov=aiohttp/ --cov=tests/ --numprocesses=auto
        -m 'not dev_mode and not autobahn'
      shell: bash
    - name: Turn coverage into xml
      run: |
        python -m coverage xml -o cython-coverage.xml --rcfile=.coveragerc-cython.toml
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        files: ./cython-coverage.xml
        disable_search: true
        flags: cython-coverage
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
  check:
    if: always()
    needs:
    - lint
    - test
    - autobahn
    runs-on: self-hosted
    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
    - name: Trigger codecov notification
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
        run_command: send-notifications
  pre-deploy:
    name: Pre-Deploy
    runs-on: self-hosted
    needs:
    - check
    - pre-setup
    if: fromJSON(needs.pre-setup.outputs.release-requested)
    steps:
    - name: Dummy
      run: |
        echo "Predeploy step"
  build-tarball:
    permissions:
      contents: read
    name: Tarball
    runs-on: self-hosted
    needs: pre-deploy
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Python
      uses: actions/setup-python@v6
    - name: Install build tooling and cython
      run: python -m pip install -U pip wheel setuptools build twine -r requirements/cython.in
        -c requirements/cython.txt
    - name: Restore llhttp generated files
      uses: actions/download-artifact@v8
      with:
        name: llhttp
        path: vendor/llhttp/build/
    - name: Cythonize
      run: |
        make cythonize
    - name: Make sdist
      run: |
        python -m build --sdist
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-sdist
        path: dist
  build-wheels:
    permissions:
      contents: read
    name: Build wheels on ${{ matrix.os }} ${{ matrix.qemu }} ${{ matrix.musl }}
    runs-on: self-hosted
    needs: pre-deploy
    strategy:
      matrix:
        os:
        - ubuntu-latest
        qemu:
        - ''
        musl:
        - ''
      fail-fast: false
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Set up QEMU
      if: ${{ matrix.qemu }}
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all
        image: tonistiigi/binfmt:qemu-v8.1.5
      id: qemu
    - name: Prepare emulation
      run: |
        if [[ -n "${{ matrix.qemu }}" ]]; then
          # Build emulated architectures only if QEMU is set,
          # use default "auto" otherwise
          echo "CIBW_ARCHS_LINUX=${{ matrix.qemu }}" >> $GITHUB_ENV
          # Override pyproject.toml's `build[uv]`: the pypa odd-arch
          # manylinux/musllinux containers do not ship `uv` preinstalled.
          echo "CIBW_BUILD_FRONTEND=build" >> $GITHUB_ENV
        fi
      shell: bash
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.x
    - name: Install build tooling and cython
      run: python -m pip install -U pip wheel setuptools build twine -r requirements/cython.in
        -c requirements/cython.txt
    - name: Restore llhttp generated files
      uses: actions/download-artifact@v8
      with:
        name: llhttp
        path: vendor/llhttp/build/
    - name: Cythonize
      run: |
        make cythonize
    - name: Build wheels
      uses: pypa/cibuildwheel@v3.4.1
      with:
        extras: uv
      env:
        CIBW_SKIP: pp* ${{ matrix.musl == 'musllinux' && '*manylinux*' || '*musllinux*'
          }}
        CIBW_ARCHS_MACOS: x86_64 arm64 universal2
    - name: Upload wheels
      uses: actions/upload-artifact@v7
      with:
        name: |-
          dist-${{ matrix.os }}-${{ matrix.musl }}-${{
            matrix.qemu
            && matrix.qemu
            || 'native'
          }}
        path: ./wheelhouse/*.whl
  deploy:
    name: Deploy
    needs:
    - build-tarball
    - build-wheels
    - pre-setup
    runs-on: self-hosted
    if: needs.pre-setup.outputs.upstream-repository-id == github.repository_id
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/aiohttp
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Login
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
    - name: Download distributions
      uses: actions/download-artifact@v8
      with:
        path: dist
        pattern: dist-*
        merge-multiple: true
    - name: Collected dists
      run: |
        tree dist
    - name: Check whether the GitHub Release already exists
      id: gh-release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ github.ref_name }}
      run: |
        if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" \
            >/dev/null 2>err; then
          echo 'exists=true' >> "${GITHUB_OUTPUT}"
        elif grep -qx 'release not found' err; then
          echo 'exists=false' >> "${GITHUB_OUTPUT}"
        else
          cat err >&2
          exit 1
        fi
    - name: Make Release
      if: steps.gh-release.outputs.exists != 'true'
      uses: aio-libs/create-release@v1.6.6
      with:
        changes_file: CHANGES.rst
        name: aiohttp
        version_file: aiohttp/__init__.py
        github_token: ${{ secrets.GITHUB_TOKEN }}
        dist_dir: dist
        fix_issue_regex: :issue:`(\d+)`
        fix_issue_repl: '#\1'
    - name: "Publish \U0001F40D\U0001F4E6 to PyPI"
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.3.0
      with:
        inputs: ./dist/*.tar.gz ./dist/*.whl
    - name: Upload artifact signatures to GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: dist/**
'on':
  merge_group: null
  push:
    branches:
    - master
    - '[0-9].[0-9]+'
    tags:
    - v*
  pull_request:
    branches:
    - master
    - '[0-9].[0-9]+'
  schedule:
  - cron: 0 6 * * *
  workflow_dispatch: {}
